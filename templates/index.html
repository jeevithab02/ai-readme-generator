<!DOCTYPE html>
<html>
<head>
    <title>AI README Generator</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e5e7eb;
        }

        h1 {
            text-align: center;
            margin: 20px;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .card {
            flex: 1;
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        input, textarea, select {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        textarea {
            height: 80px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4f46e5;
        }

        .preview {
            white-space: pre-wrap;
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .success {
            color: #22c55e;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h1>🚀 AI README Generator</h1>

<div class="container">

    <!-- FORM -->
    <div class="card">
        <form method="POST">
            <input name="name" placeholder="Your Name" required>

            <textarea name="bio" placeholder="Your Bio"></textarea>

            <input name="skills" placeholder="Skills (comma separated)">
            <input name="projects" placeholder="Projects (comma separated)">
            <input name="github" placeholder="GitHub Username">

            <select name="theme">
                <option value="dark">Dark Theme</option>
                <option value="light">Light Theme</option>
            </select>

            <button type="submit">✨ Generate README</button>
        </form>
    </div>

    <!-- PREVIEW -->
    <div class="card">
        <div class="actions">
            <button onclick="copyText()">📋 Copy</button>
            <button onclick="downloadFile()">⬇️ Download</button>
        </div>

        <div id="preview" class="preview">{{ readme }}</div>

        <div id="msg" class="success"></div>
    </div>

</div>

<script>
function copyText() {
    const text = document.getElementById("preview").innerText;
    navigator.clipboard.writeText(text);

    document.getElementById("msg").innerText = "✅ Copied to clipboard!";
}

function downloadFile() {
    const text = document.getElementById("preview").innerText;

    const blob = new Blob([text], { type: "text/plain" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "README.md";
    link.click();

    document.getElementById("msg").innerText = "⬇️ Download started!";
}
</script>

</body>
</html>
